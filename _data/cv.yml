  sections:
    Summary:
      - Undergraduate student in Data Science and Big Data Technology at Southern University of Science and Technology (SUSTech), with previous training in Clinical Medicine. Research interests include Medical AI, LLM agents, trustworthy machine learning, and knowledge graphs.

    Education:
      - institution: Southern University of Science and Technology

        end_date: present
        summary: Expected March 2028
        highlights:
          - Previous training in Clinical Medicine, 2023-2025.
          - "**GPA: 3.90/4.00 (Top 10%).**"

    Experience:
      - company: Department of Statistics and Data Science, SUSTech
        position: Undergraduate Researcher
        location: Shenzhen, China
        start_date: 2026-02
        end_date: present
        summary: "Supervised by Prof. Guanhua Chen. Topic: Medical AI Agents."
        highlights:
          - Converted PrimeKG from CSV files into a Neo4j knowledge graph to support structured medical knowledge retrieval and Cypher-based querying.
          - Reproduced a knowledge-graph-grounded agent pipeline (User Question -> CLI -> ReAct Agent -> Neo4j MCP Server -> Neo4j/Cypher -> Results) using a DashScope model, enabling natural-language medical queries over the graph.
          - Reproduced the inference workflow of an Alibaba WebAgent and built an AfriMedQA-based evaluation pipeline as a foundation for medical agent experimentation.

      - company: Department of Computer Science, SUSTech
        position: Undergraduate Researcher
        location: Shenzhen, China
        start_date: 2025-09
        end_date: 2026-02
        summary: "Supervised by Prof. Jianguo Zhang. Topic: Out-of-Distribution (OOD) Detection & Trustworthy Machine Learning."
        highlights:
          - Developed a perturbation-driven OOD detection method in OpenOOD using gradient-based semantic/covariate perturbations at BatchNorm layers with two auxiliary heads, improving AUROC by up to 5.3 points and reducing FPR@95 by up to 18.6 points over the MSP baseline on CIFAR-10 benchmarks.
          - Ran ablation studies on gradient processing, perturbation layer placement, and backpropagation scope; identified gradient clearing as harmful and validated auxiliary-head initialization, improving AUROC from 91.84 to 92.58 and lowering FPR@95 from 26.29 to 24.14.

    Projects:
      - name: Optimization of NIPT Testing Timing and Fetal Chromosomal Abnormality Diagnosis
        summary: Mathematical Contest in Modeling project; **First Prize (Provincial Level)**.
        highlights:
          - Applied a linear mixed-effects model with logit transformation and random intercepts to characterize the relationship between gestational age, BMI, and fetal Y-chromosome concentration, achieving R^2 = 0.789.
          - Used K-means clustering, probability-threshold modeling, and risk / chance-constrained optimization to recommend BMI-specific NIPT testing windows.
          - Built a logistic regression classifier for fetal chromosomal abnormality detection with chromosome concentration, GC-content, and Z-score features, achieving AUC = 0.822 with robustness validated by bootstrap and sensitivity analysis.

      - name: Chinese Chess Game System
        summary: Course project.
        highlights:
          - "Developed a Chinese Chess application with account login, save/load, replay, and four gameplay modes: timed, human-vs-AI (greedy algorithm), hot-seat, and classic endgames."
          - Responsible for UI design, piece-rule logic, and the replay module; **selected as one of two showcased projects in a class of 150+ students**.

